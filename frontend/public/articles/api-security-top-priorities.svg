<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0a1e"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g stroke="#1a1040" stroke-width="1" opacity="0.9">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="133" y1="0" x2="133" y2="450"/><line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/><line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- central API node -->
  <circle cx="400" cy="225" r="60" fill="#110d25" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="400" cy="225" r="48" fill="none" stroke="#4338ca" stroke-width="1" opacity="0.5"/>
  <text x="400" y="219" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="13" font-weight="bold">API</text>
  <text x="400" y="237" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="8" letter-spacing="2">GATEWAY</text>

  <!-- spoke lines -->
  <g stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5">
    <line x1="345" y1="180" x2="200" y2="100"/>
    <line x1="455" y1="180" x2="600" y2="100"/>
    <line x1="340" y1="225" x2="155" y2="225"/>
    <line x1="460" y1="225" x2="645" y2="225"/>
    <line x1="345" y1="270" x2="200" y2="350"/>
    <line x1="455" y1="270" x2="600" y2="350"/>
  </g>

  <!-- node: AUTHN -->
  <rect x="110" y="60" width="155" height="70" rx="8" fill="#0d0a1e" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="188" y="82" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9" letter-spacing="2">AUTHN</text>
  <text x="125" y="100" fill="#64748b" font-family="monospace" font-size="8">OAuth 2.0 · OIDC</text>
  <text x="125" y="114" fill="#64748b" font-family="monospace" font-size="8">JWT verify · mTLS</text>
  <circle cx="252" cy="88" r="5" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>

  <!-- node: AUTHZ -->
  <rect x="535" y="60" width="155" height="70" rx="8" fill="#0d0a1e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="613" y="82" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="9" letter-spacing="2">AUTHZ</text>
  <text x="550" y="100" fill="#64748b" font-family="monospace" font-size="8">RBAC · ABAC · BOLA</text>
  <text x="550" y="114" fill="#64748b" font-family="monospace" font-size="8">object-level checks</text>
  <circle cx="548" cy="88" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>

  <!-- node: RATE LIMIT -->
  <rect x="50" y="190" width="130" height="70" rx="8" fill="#0d0a1e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="115" y="212" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8" letter-spacing="1">RATE LIMIT</text>
  <!-- mini bar chart -->
  <rect x="65" y="232" width="8" height="15" rx="1" fill="#f59e0b" opacity="0.8"/>
  <rect x="77" y="226" width="8" height="21" rx="1" fill="#f59e0b" opacity="0.6"/>
  <rect x="89" y="220" width="8" height="27" rx="1" fill="#ef4444" opacity="0.9"/>
  <rect x="101" y="228" width="8" height="19" rx="1" fill="#f59e0b" opacity="0.5"/>
  <rect x="113" y="234" width="8" height="13" rx="1" fill="#f59e0b" opacity="0.4"/>
  <text x="115" y="254" text-anchor="middle" fill="#475569" font-family="monospace" font-size="7">429 too many req</text>
  <circle cx="65" cy="212" r="5" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>

  <!-- node: VALIDATION -->
  <rect x="620" y="190" width="140" height="70" rx="8" fill="#0d0a1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="690" y="212" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="8" letter-spacing="1">VALIDATION</text>
  <text x="635" y="228" fill="#64748b" font-family="monospace" font-size="7">schema · types</text>
  <text x="635" y="240" fill="#64748b" font-family="monospace" font-size="7">size · format</text>
  <text x="635" y="252" fill="#10b981" font-family="monospace" font-size="7">reject malformed</text>
  <circle cx="745" cy="212" r="5" fill="#10b981" opacity="0.8" filter="url(#glow)"/>

  <!-- node: LOGGING -->
  <rect x="110" y="320" width="155" height="70" rx="8" fill="#0d0a1e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="188" y="342" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="9" letter-spacing="2">LOGGING</text>
  <text x="125" y="360" fill="#64748b" font-family="monospace" font-size="8">request id · trace</text>
  <text x="125" y="374" fill="#64748b" font-family="monospace" font-size="8">anomaly detection</text>
  <circle cx="252" cy="348" r="5" fill="#ef4444" opacity="0.8" filter="url(#glow)"/>

  <!-- node: ENCRYPTION -->
  <rect x="535" y="320" width="155" height="70" rx="8" fill="#0d0a1e" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="613" y="342" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9" letter-spacing="2">ENCRYPTION</text>
  <text x="550" y="360" fill="#64748b" font-family="monospace" font-size="8">TLS 1.3 · HSTS</text>
  <text x="550" y="374" fill="#64748b" font-family="monospace" font-size="8">no secrets in resp</text>
  <circle cx="548" cy="348" r="5" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>

  <!-- bottom label -->
  <text x="400" y="425" text-anchor="middle" fill="#334155" font-family="monospace" font-size="10">Gateway · Authz · Validation · Observability</text>
</svg>
