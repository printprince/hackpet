<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1f"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="gr1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- bg -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- grid lines -->
  <g stroke="#1e2d50" stroke-width="1" opacity="0.6">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- pipeline track -->
  <rect x="60" y="208" width="680" height="34" rx="17" fill="#0f1f3d" stroke="#1e3a6e" stroke-width="1.5"/>

  <!-- stage blocks -->
  <!-- PLAN -->
  <rect x="80" y="150" width="110" height="140" rx="8" fill="#0d1f40" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="80" y="150" width="110" height="5" rx="4" fill="#22d3ee"/>
  <text x="135" y="200" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">PLAN</text>
  <!-- icon: calendar -->
  <rect x="111" y="210" width="48" height="42" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="111" y1="220" x2="159" y2="220" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <rect x="118" y="226" width="8" height="6" rx="1" fill="#22d3ee" opacity="0.8"/>
  <rect x="130" y="226" width="8" height="6" rx="1" fill="#22d3ee" opacity="0.5"/>
  <rect x="142" y="226" width="8" height="6" rx="1" fill="#22d3ee" opacity="0.3"/>
  <rect x="118" y="236" width="8" height="6" rx="1" fill="#22d3ee" opacity="0.6"/>
  <rect x="130" y="236" width="8" height="6" rx="1" fill="#22d3ee" opacity="0.4"/>
  <text x="135" y="268" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">requirements</text>

  <!-- CODE -->
  <rect x="220" y="130" width="110" height="160" rx="8" fill="#0d1f40" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="220" y="130" width="110" height="5" rx="4" fill="#818cf8"/>
  <text x="275" y="177" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="10" font-weight="bold">CODE</text>
  <!-- code lines -->
  <rect x="235" y="187" width="60" height="3" rx="1" fill="#818cf8" opacity="0.7"/>
  <rect x="235" y="195" width="45" height="3" rx="1" fill="#818cf8" opacity="0.5"/>
  <rect x="240" y="203" width="50" height="3" rx="1" fill="#22d3ee" opacity="0.6"/>
  <rect x="240" y="211" width="35" height="3" rx="1" fill="#818cf8" opacity="0.4"/>
  <rect x="235" y="219" width="55" height="3" rx="1" fill="#818cf8" opacity="0.3"/>
  <rect x="240" y="227" width="40" height="3" rx="1" fill="#a855f7" opacity="0.6"/>
  <rect x="235" y="235" width="48" height="3" rx="1" fill="#818cf8" opacity="0.5"/>
  <text x="275" y="268" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">SAST · linting</text>

  <!-- BUILD -->
  <rect x="360" y="110" width="110" height="180" rx="8" fill="#0d1f40" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="360" y="110" width="110" height="5" rx="4" fill="#a855f7"/>
  <text x="415" y="155" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="10" font-weight="bold">BUILD</text>
  <!-- gear icon -->
  <circle cx="415" cy="190" r="18" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
  <circle cx="415" cy="190" r="8" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
  <rect x="412" y="168" width="6" height="7" rx="2" fill="#a855f7" opacity="0.8"/>
  <rect x="412" y="205" width="6" height="7" rx="2" fill="#a855f7" opacity="0.8"/>
  <rect x="394" y="187" width="7" height="6" rx="2" fill="#a855f7" opacity="0.8"/>
  <rect x="429" y="187" width="7" height="6" rx="2" fill="#a855f7" opacity="0.8"/>
  <text x="415" y="238" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">SCA · SBOM</text>
  <text x="415" y="268" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">dependency scan</text>

  <!-- TEST -->
  <rect x="500" y="130" width="110" height="160" rx="8" fill="#0d1f40" stroke="#22d3ee" stroke-width="1.5" opacity="0.85"/>
  <rect x="500" y="130" width="110" height="5" rx="4" fill="#22d3ee" opacity="0.85"/>
  <text x="555" y="177" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">TEST</text>
  <!-- check marks -->
  <circle cx="525" cy="198" r="9" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <polyline points="520,198 524,202 531,193" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <text x="545" y="202" fill="#94a3b8" font-family="monospace" font-size="8">DAST</text>
  <circle cx="525" cy="218" r="9" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <polyline points="520,218 524,222 531,213" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <text x="545" y="222" fill="#94a3b8" font-family="monospace" font-size="8">pen test</text>
  <circle cx="525" cy="238" r="9" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <polyline points="520,238 524,242 531,233" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <text x="545" y="242" fill="#94a3b8" font-family="monospace" font-size="8">secrets</text>
  <text x="555" y="268" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">security gates</text>

  <!-- DEPLOY -->
  <rect x="640" y="150" width="110" height="140" rx="8" fill="#0d1f40" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
  <rect x="640" y="150" width="110" height="5" rx="4" fill="#34d399" opacity="0.7"/>
  <text x="695" y="200" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">DEPLOY</text>
  <!-- rocket -->
  <path d="M695 215 C695 200 710 195 710 210 L710 235 L695 245 L680 235 L680 210 C680 195 695 200 695 215 Z" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
  <circle cx="695" cy="218" r="5" fill="#34d399" opacity="0.6"/>
  <text x="695" y="268" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">signed · verified</text>

  <!-- arrows between stages -->
  <g fill="url(#gr1)" filter="url(#glow)">
    <polygon points="210,222 200,216 200,228" opacity="0.9"/>
    <polygon points="350,222 340,216 340,228" opacity="0.9"/>
    <polygon points="490,222 480,216 480,228" opacity="0.9"/>
    <polygon points="630,222 620,216 620,228" opacity="0.9"/>
  </g>
  <line x1="190" y1="225" x2="200" y2="225" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <line x1="330" y1="225" x2="340" y2="225" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <line x1="470" y1="225" x2="480" y2="225" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <line x1="610" y1="225" x2="620" y2="225" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>

  <!-- shift-left arrow (big) -->
  <path d="M680 55 L140 55" stroke="url(#gr1)" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowHead)" opacity="0.9"/>
  <defs>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#22d3ee" opacity="0.9"/>
    </marker>
  </defs>
  <text x="400" y="46" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="3" opacity="0.9">← SHIFT LEFT SECURITY</text>

  <!-- bottom label -->
  <text x="400" y="420" text-anchor="middle" fill="#334155" font-family="monospace" font-size="11">find bugs early · fix cheap · ship fast</text>
</svg>
