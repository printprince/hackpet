<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4a1e08"/>
      <stop offset="100%" stop-color="#0e0404"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#622e0a"/>
      <stop offset="100%" stop-color="#38160a"/>
    </radialGradient>
    <radialGradient id="armor-chest" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="fire-burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="fire-glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <!-- Fire burst behind body -->
  <circle cx="50" cy="55" r="42" fill="url(#fire-burst)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#f97316" stroke-width="0.7" opacity="0.5" filter="url(#softglow)"/>
  <ellipse cx="50" cy="88" rx="21" ry="5.5" fill="#f97316" opacity="0.45" filter="url(#softglow)"/>
  <!-- Large angular wings -->
  <path d="M25 50 Q5 28 8 5 Q18 20 22 44 Q12 33 20 48 Z" fill="#f97316" opacity="0.75" filter="url(#fire-glow)"/>
  <path d="M25 50 Q5 28 8 5 Q18 20 22 44" stroke="#fbbf24" stroke-width="1.2" fill="none" filter="url(#fire-glow)"/>
  <path d="M24 60 Q4 50 2 28 Q14 38 18 56 Z" fill="#fb923c" opacity="0.6" filter="url(#fire-glow)"/>
  <path d="M24 60 Q4 50 2 28 Q14 38 18 56" stroke="#fbbf24" stroke-width="0.9" fill="none" filter="url(#fire-glow)"/>
  <!-- Wing inner flames -->
  <path d="M23 47 Q12 33 14 16" stroke="#fbbf24" stroke-width="0.7" fill="none" opacity="0.8" filter="url(#softglow)"/>
  <path d="M21 54 Q8 44 9 25" stroke="#fde68a" stroke-width="0.6" fill="none" opacity="0.6" filter="url(#softglow)"/>
  <path d="M75 50 Q95 28 92 5 Q82 20 78 44 Q88 33 80 48 Z" fill="#f97316" opacity="0.75" filter="url(#fire-glow)"/>
  <path d="M75 50 Q95 28 92 5 Q82 20 78 44" stroke="#fbbf24" stroke-width="1.2" fill="none" filter="url(#fire-glow)"/>
  <path d="M76 60 Q96 50 98 28 Q86 38 82 56 Z" fill="#fb923c" opacity="0.6" filter="url(#fire-glow)"/>
  <path d="M76 60 Q96 50 98 28 Q86 38 82 56" stroke="#fbbf24" stroke-width="0.9" fill="none" filter="url(#fire-glow)"/>
  <!-- Wing inner flames right -->
  <path d="M77 47 Q88 33 86 16" stroke="#fbbf24" stroke-width="0.7" fill="none" opacity="0.8" filter="url(#softglow)"/>
  <path d="M79 54 Q92 44 91 25" stroke="#fde68a" stroke-width="0.6" fill="none" opacity="0.6" filter="url(#softglow)"/>
  <!-- Body -->
  <ellipse cx="50" cy="64" rx="20" ry="19" fill="url(#body)"/>
  <!-- Scale armor chest -->
  <path d="M33 55 Q50 49 67 55 L64 75 Q50 82 36 75 Z" fill="url(#armor-chest)" opacity="0.7"/>
  <!-- Scale rows on armor -->
  <path d="M36 59 Q42 56 48 59" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <path d="M42 59 Q48 56 54 59" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <path d="M48 59 Q54 56 60 59" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <path d="M34 65 Q40 62 46 65" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <path d="M40 65 Q46 62 52 65" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <path d="M46 65 Q52 62 58 65" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <path d="M52 65 Q58 62 64 65" stroke="#92400e" stroke-width="1.2" fill="none"/>
  <!-- Head -->
  <circle cx="50" cy="39" r="24" fill="url(#body)"/>
  <!-- Multiple horns -->
  <path d="M34 24 L30 8 L38 18 Z" fill="#6b2200"/>
  <path d="M34 24 L30 8 L38 18 Z" fill="none" stroke="#f97316" stroke-width="1" filter="url(#softglow)"/>
  <path d="M42 21 L40 5 L48 14 Z" fill="#6b2200"/>
  <path d="M42 21 L40 5 L48 14 Z" fill="none" stroke="#f97316" stroke-width="1" filter="url(#softglow)"/>
  <path d="M50 20 L50 4 L56 14 L44 14 Z" fill="#7a2800"/>
  <path d="M50 20 L50 4 L56 14 L44 14 Z" fill="none" stroke="#fbbf24" stroke-width="1.2" filter="url(#softglow)"/>
  <path d="M58 21 L52 5 L60 14 Z" fill="#6b2200"/>
  <path d="M58 21 L52 5 L60 14 Z" fill="none" stroke="#f97316" stroke-width="1" filter="url(#softglow)"/>
  <path d="M66 24 L62 8 L70 18 Z" fill="#6b2200"/>
  <path d="M66 24 L62 8 L70 18 Z" fill="none" stroke="#f97316" stroke-width="1" filter="url(#softglow)"/>
  <!-- Horn glow tips -->
  <circle cx="30" cy="8" r="2" fill="#fbbf24" filter="url(#fire-glow)"/>
  <circle cx="40" cy="5" r="2" fill="#fbbf24" filter="url(#fire-glow)"/>
  <circle cx="50" cy="4" r="2.5" fill="#fde68a" filter="url(#fire-glow)"/>
  <circle cx="52" cy="5" r="2" fill="#fbbf24" filter="url(#fire-glow)"/>
  <circle cx="62" cy="8" r="2" fill="#fbbf24" filter="url(#fire-glow)"/>
  <!-- Flame mane -->
  <path d="M27 40 Q20 24 28 12 Q32 24 28 38" fill="#f97316" opacity="0.8" filter="url(#fire-glow)"/>
  <path d="M29 34 Q24 20 30 10 Q34 22 30 32" fill="#fbbf24" opacity="0.6" filter="url(#fire-glow)"/>
  <path d="M73 40 Q80 24 72 12 Q68 24 72 38" fill="#f97316" opacity="0.8" filter="url(#fire-glow)"/>
  <path d="M71 34 Q76 20 70 10 Q66 22 70 32" fill="#fbbf24" opacity="0.6" filter="url(#fire-glow)"/>
  <!-- Eyes -->
  <circle cx="42" cy="38" r="6" fill="#200800"/>
  <circle cx="58" cy="38" r="6" fill="#200800"/>
  <circle cx="42" cy="38" r="4.5" fill="#f97316" filter="url(#fire-glow)"/>
  <circle cx="58" cy="38" r="4.5" fill="#f97316" filter="url(#fire-glow)"/>
  <circle cx="42" cy="38" r="2" fill="#fbbf24"/>
  <circle cx="58" cy="38" r="2" fill="#fbbf24"/>
  <!-- Fierce brows -->
  <path d="M37 32 L46 35" stroke="#1a0800" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M54 35 L63 32" stroke="#1a0800" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="47.5" rx="10" ry="7" fill="#3a1808"/>
  <ellipse cx="47.5" cy="46" rx="1.5" ry="1.2" fill="#f97316" opacity="0.8"/>
  <ellipse cx="52.5" cy="46" rx="1.5" ry="1.2" fill="#f97316" opacity="0.8"/>
  <path d="M44 49.5 Q47 52.5 50 51 Q53 52.5 56 49.5" stroke="#8b2500" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Fangs -->
  <path d="M47 51 L46 55" stroke="#f0e0c0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M53 51 L54 55" stroke="#f0e0c0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Golden claw marks on chest -->
  <path d="M40 57 L37 64" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M43 55.5 L41 63" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" filter="url(#softglow)"/>
  <path d="M46 55 L45 62" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Arms -->
  <ellipse cx="31" cy="65" rx="8" ry="6" fill="#38160a"/>
  <ellipse cx="69" cy="65" rx="8" ry="6" fill="#38160a"/>
  <!-- Feet -->
  <ellipse cx="40" cy="82" rx="9.5" ry="5.5" fill="#38160a"/>
  <ellipse cx="60" cy="82" rx="9.5" ry="5.5" fill="#38160a"/>
  <!-- Ember sparks -->
  <circle cx="15" cy="35" r="2" fill="#fbbf24" filter="url(#fire-glow)" opacity="0.9"/>
  <circle cx="85" cy="30" r="2" fill="#fbbf24" filter="url(#fire-glow)" opacity="0.9"/>
  <circle cx="10" cy="58" r="1.5" fill="#f97316" filter="url(#softglow)" opacity="0.8"/>
  <circle cx="90" cy="52" r="1.5" fill="#f97316" filter="url(#softglow)" opacity="0.8"/>
  <circle cx="18" cy="75" r="1" fill="#f97316" filter="url(#softglow)" opacity="0.7"/>
  <circle cx="82" cy="70" r="1" fill="#f97316" filter="url(#softglow)" opacity="0.7"/>
</svg>
