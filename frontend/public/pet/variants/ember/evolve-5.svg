<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#501e06"/>
      <stop offset="100%" stop-color="#0c0302"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6e300a"/>
      <stop offset="100%" stop-color="#3e1808"/>
    </radialGradient>
    <radialGradient id="lava" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </radialGradient>
    <radialGradient id="inferno" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="fire-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="intense-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <!-- Inferno aura -->
  <circle cx="50" cy="50" r="47" fill="url(#inferno)"/>
  <!-- Outer fire rings -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#f97316" stroke-width="0.8" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.5" filter="url(#softglow)"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#f97316" stroke-width="0.4" opacity="0.35"/>
  <ellipse cx="50" cy="88" rx="22" ry="6" fill="#fbbf24" opacity="0.5" filter="url(#intense-glow)"/>
  <!-- Massive flame wings (left) filling frame -->
  <path d="M22 50 Q0 22 3 0 Q14 14 20 38 Q8 28 18 46 Z" fill="#f97316" opacity="0.8" filter="url(#fire-glow)"/>
  <path d="M22 50 Q0 22 3 0 Q14 14 20 38" stroke="#fbbf24" stroke-width="1.5" fill="none" filter="url(#fire-glow)"/>
  <path d="M20 60 Q0 45 0 18 Q12 30 16 54 Z" fill="#fb923c" opacity="0.65" filter="url(#fire-glow)"/>
  <path d="M20 60 Q0 45 0 18 Q12 30 16 54" stroke="#fde68a" stroke-width="1" fill="none" filter="url(#fire-glow)"/>
  <path d="M18 70 Q0 62 0 40 Q10 48 14 64 Z" fill="#ef4444" opacity="0.5" filter="url(#softglow)"/>
  <!-- Wing inner veins left -->
  <path d="M20 47 Q6 30 8 10" stroke="#fde68a" stroke-width="0.8" fill="none" opacity="0.7" filter="url(#softglow)"/>
  <path d="M18 55 Q3 42 4 22" stroke="#fbbf24" stroke-width="0.7" fill="none" opacity="0.6" filter="url(#softglow)"/>
  <path d="M16 65 Q2 56 3 36" stroke="#f97316" stroke-width="0.6" fill="none" opacity="0.5" filter="url(#softglow)"/>
  <!-- Massive flame wings (right) -->
  <path d="M78 50 Q100 22 97 0 Q86 14 80 38 Q92 28 82 46 Z" fill="#f97316" opacity="0.8" filter="url(#fire-glow)"/>
  <path d="M78 50 Q100 22 97 0 Q86 14 80 38" stroke="#fbbf24" stroke-width="1.5" fill="none" filter="url(#fire-glow)"/>
  <path d="M80 60 Q100 45 100 18 Q88 30 84 54 Z" fill="#fb923c" opacity="0.65" filter="url(#fire-glow)"/>
  <path d="M80 60 Q100 45 100 18 Q88 30 84 54" stroke="#fde68a" stroke-width="1" fill="none" filter="url(#fire-glow)"/>
  <path d="M82 70 Q100 62 100 40 Q90 48 86 64 Z" fill="#ef4444" opacity="0.5" filter="url(#softglow)"/>
  <!-- Wing inner veins right -->
  <path d="M80 47 Q94 30 92 10" stroke="#fde68a" stroke-width="0.8" fill="none" opacity="0.7" filter="url(#softglow)"/>
  <path d="M82 55 Q97 42 96 22" stroke="#fbbf24" stroke-width="0.7" fill="none" opacity="0.6" filter="url(#softglow)"/>
  <path d="M84 65 Q98 56 97 36" stroke="#f97316" stroke-width="0.6" fill="none" opacity="0.5" filter="url(#softglow)"/>
  <!-- Body glowing like molten lava -->
  <ellipse cx="50" cy="64" rx="21" ry="20" fill="url(#body)"/>
  <ellipse cx="50" cy="64" rx="21" ry="20" fill="none" stroke="#f97316" stroke-width="1" filter="url(#fire-glow)" opacity="0.8"/>
  <!-- Lava cracks on body -->
  <path d="M42 58 L50 64 L44 74" stroke="#fbbf24" stroke-width="1.2" fill="none" filter="url(#fire-glow)" opacity="0.8"/>
  <path d="M58 58 L50 64 L56 74" stroke="#fbbf24" stroke-width="1.2" fill="none" filter="url(#fire-glow)" opacity="0.8"/>
  <path d="M36 65 L50 64 L64 65" stroke="#f97316" stroke-width="0.8" fill="none" filter="url(#softglow)" opacity="0.7"/>
  <!-- Chest core -->
  <circle cx="50" cy="64" r="6" fill="#fbbf24" opacity="0.7" filter="url(#intense-glow)"/>
  <circle cx="50" cy="64" r="3.5" fill="#fde68a" filter="url(#fire-glow)"/>
  <!-- Head -->
  <circle cx="50" cy="39" r="24" fill="url(#body)"/>
  <circle cx="50" cy="39" r="24" fill="none" stroke="#f97316" stroke-width="0.8" filter="url(#fire-glow)" opacity="0.7"/>
  <!-- Lava cracks on head -->
  <path d="M42 38 L50 44" stroke="#fbbf24" stroke-width="0.8" fill="none" filter="url(#softglow)" opacity="0.6"/>
  <path d="M58 38 L50 44" stroke="#fbbf24" stroke-width="0.8" fill="none" filter="url(#softglow)" opacity="0.6"/>
  <!-- Dragon crown - intricate horns -->
  <path d="M32 22 L27 4 L36 15 Z" fill="#6b2200"/>
  <path d="M32 22 L27 4 L36 15 Z" fill="none" stroke="#fbbf24" stroke-width="1.2" filter="url(#fire-glow)"/>
  <path d="M39 19 L36 2 L46 12 Z" fill="#7a2800"/>
  <path d="M39 19 L36 2 L46 12 Z" fill="none" stroke="#fbbf24" stroke-width="1.2" filter="url(#fire-glow)"/>
  <path d="M50 17 L50 0 L57 12 L43 12 Z" fill="#8b3000"/>
  <path d="M50 17 L50 0 L57 12 L43 12 Z" fill="none" stroke="#fde68a" stroke-width="1.5" filter="url(#intense-glow)"/>
  <path d="M61 19 L54 2 L64 12 Z" fill="#7a2800"/>
  <path d="M61 19 L54 2 L64 12 Z" fill="none" stroke="#fbbf24" stroke-width="1.2" filter="url(#fire-glow)"/>
  <path d="M68 22 L64 4 L73 15 Z" fill="#6b2200"/>
  <path d="M68 22 L64 4 L73 15 Z" fill="none" stroke="#fbbf24" stroke-width="1.2" filter="url(#fire-glow)"/>
  <!-- Horn tips blazing -->
  <circle cx="27" cy="4" r="2.5" fill="#fde68a" filter="url(#intense-glow)"/>
  <circle cx="36" cy="2" r="2.5" fill="#fde68a" filter="url(#intense-glow)"/>
  <circle cx="50" cy="0" r="3" fill="white" filter="url(#intense-glow)"/>
  <circle cx="54" cy="2" r="2.5" fill="#fde68a" filter="url(#intense-glow)"/>
  <circle cx="64" cy="4" r="2.5" fill="#fde68a" filter="url(#intense-glow)"/>
  <!-- Flame mane blazing wide -->
  <path d="M26 38 Q16 18 24 6 Q30 18 26 36" fill="#f97316" opacity="0.85" filter="url(#fire-glow)"/>
  <path d="M24 34 Q16 16 22 6 Q28 18 24 32" fill="#fbbf24" opacity="0.6" filter="url(#fire-glow)"/>
  <path d="M74 38 Q84 18 76 6 Q70 18 74 36" fill="#f97316" opacity="0.85" filter="url(#fire-glow)"/>
  <path d="M76 34 Q84 16 78 6 Q72 18 76 32" fill="#fbbf24" opacity="0.6" filter="url(#fire-glow)"/>
  <!-- Eyes (blazing white-gold) -->
  <circle cx="41" cy="38" r="6.5" fill="#200800"/>
  <circle cx="59" cy="38" r="6.5" fill="#200800"/>
  <circle cx="41" cy="38" r="5" fill="#f97316" filter="url(#intense-glow)"/>
  <circle cx="59" cy="38" r="5" fill="#f97316" filter="url(#intense-glow)"/>
  <circle cx="41" cy="38" r="2.5" fill="#fde68a"/>
  <circle cx="59" cy="38" r="2.5" fill="#fde68a"/>
  <circle cx="41" cy="38" r="1" fill="white"/>
  <circle cx="59" cy="38" r="1" fill="white"/>
  <!-- Fierce brows -->
  <path d="M35 30 L45 34" stroke="#1a0800" stroke-width="3" stroke-linecap="round"/>
  <path d="M55 34 L65 30" stroke="#1a0800" stroke-width="3" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="48" rx="10.5" ry="7.5" fill="#3a1808"/>
  <ellipse cx="47.5" cy="46.5" rx="1.8" ry="1.3" fill="#f97316" opacity="0.9" filter="url(#softglow)"/>
  <ellipse cx="52.5" cy="46.5" rx="1.8" ry="1.3" fill="#f97316" opacity="0.9" filter="url(#softglow)"/>
  <path d="M43.5 50 Q47 54 50 52 Q53 54 56.5 50" stroke="#8b2500" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Fangs -->
  <path d="M47 51.5 L46 56" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round"/>
  <path d="M53 51.5 L54 56" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round"/>
  <!-- Floating fire orbs -->
  <circle cx="18" cy="30" r="3.5" fill="#f97316" opacity="0.85" filter="url(#intense-glow)"/>
  <circle cx="18" cy="30" r="1.8" fill="#fde68a" filter="url(#fire-glow)"/>
  <circle cx="82" cy="30" r="3.5" fill="#f97316" opacity="0.85" filter="url(#intense-glow)"/>
  <circle cx="82" cy="30" r="1.8" fill="#fde68a" filter="url(#fire-glow)"/>
  <circle cx="12" cy="52" r="2.5" fill="#f97316" opacity="0.8" filter="url(#fire-glow)"/>
  <circle cx="88" cy="52" r="2.5" fill="#f97316" opacity="0.8" filter="url(#fire-glow)"/>
  <circle cx="22" cy="75" r="2" fill="#fbbf24" opacity="0.75" filter="url(#fire-glow)"/>
  <circle cx="78" cy="75" r="2" fill="#fbbf24" opacity="0.75" filter="url(#fire-glow)"/>
  <!-- Arms -->
  <ellipse cx="30" cy="65" rx="8.5" ry="6" fill="#3e1808"/>
  <ellipse cx="70" cy="65" rx="8.5" ry="6" fill="#3e1808"/>
  <!-- Feet -->
  <ellipse cx="39" cy="83" rx="10" ry="6" fill="#3e1808"/>
  <ellipse cx="61" cy="83" rx="10" ry="6" fill="#3e1808"/>
  <!-- Extra embers -->
  <circle cx="35" cy="10" r="1.2" fill="#fde68a" filter="url(#fire-glow)" opacity="0.9"/>
  <circle cx="65" cy="10" r="1.2" fill="#fde68a" filter="url(#fire-glow)" opacity="0.9"/>
</svg>
