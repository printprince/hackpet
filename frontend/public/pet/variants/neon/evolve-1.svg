<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a2b"/>
      <stop offset="100%" stop-color="#04080f"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#151540"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </radialGradient>
    <filter id="cyan-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <!-- Outer ring hint -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#00e5ff" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="50" cy="88" rx="16" ry="3.5" fill="#00e5ff" opacity="0.2" filter="url(#softglow)"/>
  <!-- Body -->
  <ellipse cx="50" cy="66" rx="16" ry="15" fill="url(#body)"/>
  <!-- Head -->
  <circle cx="50" cy="44" r="20" fill="url(#body)"/>
  <!-- Ears with cyan glow -->
  <polygon points="33,30 28,15 38,22" fill="#0d1a35"/>
  <polygon points="33,30 28,15 38,22" fill="none" stroke="#00e5ff" stroke-width="0.8" filter="url(#cyan-glow)"/>
  <polygon points="33,28 30,18 36,23" fill="#00e5ff" opacity="0.25"/>
  <polygon points="67,30 62,15 72,22" fill="#0d1a35"/>
  <polygon points="67,30 62,15 72,22" fill="none" stroke="#00e5ff" stroke-width="0.8" filter="url(#cyan-glow)"/>
  <polygon points="67,28 64,18 70,23" fill="#00e5ff" opacity="0.25"/>
  <!-- LED eyes -->
  <circle cx="43" cy="43" r="4.5" fill="#001a20"/>
  <circle cx="57" cy="43" r="4.5" fill="#001a20"/>
  <circle cx="43" cy="43" r="3" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="57" cy="43" r="3" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="43" cy="43" r="1.2" fill="white"/>
  <circle cx="57" cy="43" r="1.2" fill="white"/>
  <!-- Muzzle outline -->
  <ellipse cx="50" cy="50" rx="8" ry="6" fill="#0d1230" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
  <!-- Nose -->
  <ellipse cx="50" cy="48" rx="1.8" ry="1.2" fill="#00e5ff" filter="url(#softglow)"/>
  <!-- Mouth line -->
  <path d="M47 52 Q50 54.5 53 52" stroke="#00e5ff" stroke-width="0.8" fill="none" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Circuit dots on chest -->
  <circle cx="46" cy="63" r="1.2" fill="#00e5ff" filter="url(#softglow)"/>
  <circle cx="50" cy="63" r="1.2" fill="#00e5ff" filter="url(#softglow)"/>
  <circle cx="54" cy="63" r="1.2" fill="#00e5ff" filter="url(#softglow)"/>
  <line x1="47.2" y1="63" x2="48.8" y2="63" stroke="#00e5ff" stroke-width="0.6"/>
  <line x1="51.2" y1="63" x2="52.8" y2="63" stroke="#00e5ff" stroke-width="0.6"/>
  <line x1="46" y1="64.2" x2="46" y2="67" stroke="#00e5ff" stroke-width="0.6"/>
  <line x1="54" y1="64.2" x2="54" y2="67" stroke="#00e5ff" stroke-width="0.6"/>
  <!-- Body outline glow -->
  <ellipse cx="50" cy="66" rx="16" ry="15" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.5"/>
  <circle cx="50" cy="44" r="20" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Paws -->
  <ellipse cx="35" cy="72" rx="5.5" ry="4" fill="#0d1230" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
  <ellipse cx="65" cy="72" rx="5.5" ry="4" fill="#0d1230" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
  <!-- Feet -->
  <ellipse cx="42" cy="81" rx="7" ry="4.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
  <ellipse cx="58" cy="81" rx="7" ry="4.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.6" opacity="0.8"/>
</svg>
