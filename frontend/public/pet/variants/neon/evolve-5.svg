<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14103a"/>
      <stop offset="100%" stop-color="#04020e"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#201860"/>
      <stop offset="100%" stop-color="#100c38"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyan-glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purple-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="wing-l" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="wing-r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <!-- Outer radiance rings -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#a855f7" stroke-width="0.4" opacity="0.5" filter="url(#softglow)"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#00e5ff" stroke-width="0.3" opacity="0.3"/>
  <!-- Combined aura -->
  <circle cx="50" cy="50" r="46" fill="url(#aura)"/>
  <!-- Large holographic wings (left) -->
  <path d="M26 50 Q5 30 2 8 Q14 18 20 36 Q8 40 18 52 Z" fill="url(#wing-l)"/>
  <path d="M26 50 Q5 30 2 8 Q14 18 20 36 Q8 40 18 52 Z" fill="none" stroke="#00e5ff" stroke-width="0.9" filter="url(#cyan-glow)"/>
  <path d="M24 58 Q2 52 0 30 Q12 38 18 54 Z" fill="url(#wing-l)" opacity="0.7"/>
  <path d="M24 58 Q2 52 0 30 Q12 38 18 54 Z" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#purple-glow)"/>
  <!-- Wing veins left -->
  <path d="M22 48 Q10 35 8 18" stroke="#00e5ff" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M20 54 Q6 46 4 28" stroke="#a855f7" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Large holographic wings (right) -->
  <path d="M74 50 Q95 30 98 8 Q86 18 80 36 Q92 40 82 52 Z" fill="url(#wing-r)"/>
  <path d="M74 50 Q95 30 98 8 Q86 18 80 36 Q92 40 82 52 Z" fill="none" stroke="#00e5ff" stroke-width="0.9" filter="url(#cyan-glow)"/>
  <path d="M76 58 Q98 52 100 30 Q88 38 82 54 Z" fill="url(#wing-r)" opacity="0.7"/>
  <path d="M76 58 Q98 52 100 30 Q88 38 82 54 Z" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#purple-glow)"/>
  <!-- Wing veins right -->
  <path d="M78 48 Q90 35 92 18" stroke="#00e5ff" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M80 54 Q94 46 96 28" stroke="#a855f7" stroke-width="0.5" fill="none" opacity="0.5"/>
  <ellipse cx="50" cy="89" rx="20" ry="5" fill="#00e5ff" opacity="0.3" filter="url(#softglow)"/>
  <!-- Body -->
  <ellipse cx="50" cy="65" rx="20" ry="19" fill="url(#body)"/>
  <!-- Full body glow -->
  <ellipse cx="50" cy="65" rx="20" ry="19" fill="none" stroke="#00e5ff" stroke-width="0.8" filter="url(#cyan-glow)" opacity="0.7"/>
  <!-- Hex armor body -->
  <path d="M43 57 L47 54 L53 54 L57 57 L53 60 L47 60 Z" fill="none" stroke="#00e5ff" stroke-width="0.8" filter="url(#softglow)"/>
  <path d="M43 65 L47 62 L53 62 L57 65 L53 68 L47 68 Z" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#softglow)"/>
  <path d="M43 73 L47 70 L53 70 L57 73 L53 76 L47 76 Z" fill="none" stroke="#00e5ff" stroke-width="0.7" filter="url(#softglow)"/>
  <!-- Core energy -->
  <circle cx="50" cy="64" r="4" fill="#a855f7" opacity="0.6" filter="url(#purple-glow)"/>
  <circle cx="50" cy="64" r="2" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <!-- Head -->
  <circle cx="50" cy="41" r="23" fill="url(#body)"/>
  <circle cx="50" cy="41" r="23" fill="none" stroke="#00e5ff" stroke-width="0.7" filter="url(#cyan-glow)" opacity="0.6"/>
  <!-- Halo ring -->
  <ellipse cx="50" cy="14" rx="14" ry="4" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#cyan-glow)"/>
  <ellipse cx="50" cy="14" rx="14" ry="4" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#purple-glow)"/>
  <!-- Ears -->
  <polygon points="29,25 22,7 40,17" fill="#10103a"/>
  <polygon points="29,25 22,7 40,17" fill="none" stroke="#00e5ff" stroke-width="1.3" filter="url(#cyan-glow)"/>
  <polygon points="29,23 26,12 38,18" fill="#00e5ff" opacity="0.5"/>
  <polygon points="71,25 60,7 78,17" fill="#10103a"/>
  <polygon points="71,25 60,7 78,17" fill="none" stroke="#00e5ff" stroke-width="1.3" filter="url(#cyan-glow)"/>
  <polygon points="71,23 62,12 74,18" fill="#00e5ff" opacity="0.5"/>
  <!-- Eyes (large, blazing) -->
  <circle cx="42" cy="40" r="6.5" fill="#001020"/>
  <circle cx="58" cy="40" r="6.5" fill="#001020"/>
  <circle cx="42" cy="40" r="5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="58" cy="40" r="5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="42" cy="40" r="2.5" fill="white"/>
  <circle cx="58" cy="40" r="2.5" fill="white"/>
  <circle cx="43" cy="39" r="0.8" fill="#001020"/>
  <circle cx="59" cy="39" r="0.8" fill="#001020"/>
  <!-- Eye aura -->
  <circle cx="42" cy="40" r="7" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#purple-glow)" opacity="0.7"/>
  <circle cx="58" cy="40" r="7" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#purple-glow)" opacity="0.7"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="50" rx="9.5" ry="7" fill="#0d1230"/>
  <ellipse cx="50" cy="48.5" rx="2.2" ry="1.5" fill="#00e5ff" filter="url(#softglow)"/>
  <path d="M45.5 52.5 Q50 56 54.5 52.5" stroke="#00e5ff" stroke-width="1.1" fill="none" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Multiple glowing elements floating -->
  <circle cx="20" cy="35" r="2" fill="#00e5ff" filter="url(#cyan-glow)" opacity="0.8"/>
  <circle cx="80" cy="35" r="2" fill="#00e5ff" filter="url(#cyan-glow)" opacity="0.8"/>
  <circle cx="15" cy="60" r="1.5" fill="#a855f7" filter="url(#purple-glow)" opacity="0.7"/>
  <circle cx="85" cy="60" r="1.5" fill="#a855f7" filter="url(#purple-glow)" opacity="0.7"/>
  <!-- Paws -->
  <ellipse cx="31" cy="72" rx="8" ry="5.5" fill="#10103a" stroke="#00e5ff" stroke-width="0.9" filter="url(#softglow)"/>
  <ellipse cx="69" cy="72" rx="8" ry="5.5" fill="#10103a" stroke="#00e5ff" stroke-width="0.9" filter="url(#softglow)"/>
  <!-- Feet -->
  <ellipse cx="40" cy="83" rx="9.5" ry="5.5" fill="#10103a" stroke="#a855f7" stroke-width="0.9" filter="url(#softglow)"/>
  <ellipse cx="60" cy="83" rx="9.5" ry="5.5" fill="#10103a" stroke="#a855f7" stroke-width="0.9" filter="url(#softglow)"/>
</svg>
