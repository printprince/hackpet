<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10182e"/>
      <stop offset="100%" stop-color="#04060e"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a1a55"/>
      <stop offset="100%" stop-color="#0c0c2a"/>
    </radialGradient>
    <filter id="cyan-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="50" cy="88" rx="18" ry="4" fill="#00e5ff" opacity="0.25" filter="url(#softglow)"/>
  <!-- Fin wings (4 translucent fins on back) -->
  <!-- Top left fin -->
  <path d="M30 50 Q15 30 20 12 Q28 25 30 42 Z" fill="url(#fin)"/>
  <path d="M30 50 Q15 30 20 12 Q28 25 30 42 Z" fill="none" stroke="#00e5ff" stroke-width="0.8" filter="url(#softglow)"/>
  <!-- Bottom left fin -->
  <path d="M28 62 Q10 55 8 38 Q20 44 26 56 Z" fill="url(#fin)"/>
  <path d="M28 62 Q10 55 8 38 Q20 44 26 56 Z" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#softglow)"/>
  <!-- Top right fin -->
  <path d="M70 50 Q85 30 80 12 Q72 25 70 42 Z" fill="url(#fin)"/>
  <path d="M70 50 Q85 30 80 12 Q72 25 70 42 Z" fill="none" stroke="#00e5ff" stroke-width="0.8" filter="url(#softglow)"/>
  <!-- Bottom right fin -->
  <path d="M72 62 Q90 55 92 38 Q80 44 74 56 Z" fill="url(#fin)"/>
  <path d="M72 62 Q90 55 92 38 Q80 44 74 56 Z" fill="none" stroke="#a855f7" stroke-width="0.8" filter="url(#softglow)"/>
  <!-- Body -->
  <ellipse cx="50" cy="66" rx="18" ry="17" fill="url(#body)"/>
  <!-- Hex pattern on body -->
  <path d="M44 61 L47 58.5 L53 58.5 L56 61 L53 63.5 L47 63.5 Z" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
  <path d="M44 69 L47 66.5 L53 66.5 L56 69 L53 71.5 L47 71.5 Z" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
  <path d="M37 65 L40 62.5 L46 62.5 L49 65 L46 67.5 L40 67.5 Z" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <path d="M51 65 L54 62.5 L60 62.5 L63 65 L60 67.5 L54 67.5 Z" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <!-- Head -->
  <circle cx="50" cy="43" r="22" fill="url(#body)"/>
  <!-- Ears -->
  <polygon points="31,28 25,11 39,20" fill="#0d1a35"/>
  <polygon points="31,28 25,11 39,20" fill="none" stroke="#00e5ff" stroke-width="1.2" filter="url(#cyan-glow)"/>
  <polygon points="31,26 28,15 37,21" fill="#00e5ff" opacity="0.4"/>
  <polygon points="69,28 61,11 75,20" fill="#0d1a35"/>
  <polygon points="69,28 61,11 75,20" fill="none" stroke="#00e5ff" stroke-width="1.2" filter="url(#cyan-glow)"/>
  <polygon points="69,26 63,15 73,21" fill="#00e5ff" opacity="0.4"/>
  <!-- Big glowing eyes -->
  <circle cx="43" cy="42" r="6" fill="#001825"/>
  <circle cx="57" cy="42" r="6" fill="#001825"/>
  <circle cx="43" cy="42" r="4.5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="57" cy="42" r="4.5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="43" cy="42" r="2" fill="white"/>
  <circle cx="57" cy="42" r="2" fill="white"/>
  <circle cx="44" cy="41" r="0.7" fill="#001825"/>
  <circle cx="58" cy="41" r="0.7" fill="#001825"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="50" rx="9" ry="6.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.8"/>
  <ellipse cx="50" cy="48.5" rx="2" ry="1.3" fill="#00e5ff" filter="url(#softglow)"/>
  <path d="M46 52.5 Q50 55.5 54 52.5" stroke="#00e5ff" stroke-width="1" fill="none" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Circuit traces on head -->
  <path d="M34 43 L38 43 L38 37 L46 37" stroke="#00e5ff" stroke-width="0.7" fill="none" opacity="0.6" filter="url(#softglow)"/>
  <path d="M66 43 L62 43 L62 37 L54 37" stroke="#00e5ff" stroke-width="0.7" fill="none" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="34" cy="43" r="1" fill="#00e5ff" filter="url(#softglow)"/>
  <circle cx="66" cy="43" r="1" fill="#00e5ff" filter="url(#softglow)"/>
  <!-- Collar ring -->
  <ellipse cx="50" cy="56" rx="14" ry="3.5" fill="none" stroke="#a855f7" stroke-width="2" filter="url(#softglow)"/>
  <!-- Paws -->
  <ellipse cx="33" cy="73" rx="6.5" ry="4.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
  <ellipse cx="67" cy="73" rx="6.5" ry="4.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
  <!-- Feet -->
  <ellipse cx="41" cy="83" rx="8" ry="5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
  <ellipse cx="59" cy="83" rx="8" ry="5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.8" opacity="0.9"/>
</svg>
