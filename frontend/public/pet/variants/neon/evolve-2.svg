<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1a30"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#181850"/>
      <stop offset="100%" stop-color="#0a0a25"/>
    </radialGradient>
    <filter id="cyan-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.35"/>
  <ellipse cx="50" cy="88" rx="17" ry="4" fill="#00e5ff" opacity="0.2" filter="url(#softglow)"/>
  <!-- Body -->
  <ellipse cx="50" cy="66" rx="17" ry="16" fill="url(#body)"/>
  <!-- Head -->
  <circle cx="50" cy="43" r="21" fill="url(#body)"/>
  <!-- Antenna -->
  <line x1="50" y1="22" x2="50" y2="12" stroke="#00e5ff" stroke-width="1" filter="url(#cyan-glow)"/>
  <circle cx="50" cy="10" r="2.5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <!-- Ears with cyan glow -->
  <polygon points="32,29 27,13 38,21" fill="#0d1a35"/>
  <polygon points="32,29 27,13 38,21" fill="none" stroke="#00e5ff" stroke-width="1" filter="url(#cyan-glow)"/>
  <polygon points="32,27 29,17 36,22" fill="#00e5ff" opacity="0.3"/>
  <polygon points="68,29 62,13 73,21" fill="#0d1a35"/>
  <polygon points="68,29 62,13 73,21" fill="none" stroke="#00e5ff" stroke-width="1" filter="url(#cyan-glow)"/>
  <polygon points="68,27 64,17 71,22" fill="#00e5ff" opacity="0.3"/>
  <!-- Glowing ring collar -->
  <ellipse cx="50" cy="56" rx="14" ry="4" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#cyan-glow)" opacity="0.9"/>
  <ellipse cx="50" cy="56" rx="14" ry="4" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.6"/>
  <!-- LED eyes (bigger) -->
  <circle cx="43" cy="42" r="5" fill="#001a20"/>
  <circle cx="57" cy="42" r="5" fill="#001a20"/>
  <circle cx="43" cy="42" r="3.5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="57" cy="42" r="3.5" fill="#00e5ff" filter="url(#cyan-glow)"/>
  <circle cx="43" cy="42" r="1.3" fill="white"/>
  <circle cx="57" cy="42" r="1.3" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="49" rx="8.5" ry="6" fill="#0d1230" stroke="#00e5ff" stroke-width="0.7"/>
  <ellipse cx="50" cy="47.5" rx="1.8" ry="1.2" fill="#00e5ff" filter="url(#softglow)"/>
  <path d="M46.5 51.5 Q50 54 53.5 51.5" stroke="#00e5ff" stroke-width="0.9" fill="none" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Circuit lines on body -->
  <line x1="50" y1="57" x2="50" y2="76" stroke="#00e5ff" stroke-width="0.7" opacity="0.6"/>
  <line x1="44" y1="64" x2="56" y2="64" stroke="#00e5ff" stroke-width="0.7" opacity="0.6"/>
  <circle cx="50" cy="64" r="1.5" fill="#00e5ff" filter="url(#softglow)"/>
  <line x1="38" y1="64" x2="44" y2="64" stroke="#a855f7" stroke-width="0.7" opacity="0.6"/>
  <line x1="56" y1="64" x2="62" y2="64" stroke="#a855f7" stroke-width="0.7" opacity="0.6"/>
  <circle cx="38" cy="64" r="1.2" fill="#a855f7" filter="url(#softglow)"/>
  <circle cx="62" cy="64" r="1.2" fill="#a855f7" filter="url(#softglow)"/>
  <!-- Circuit on head -->
  <path d="M35 43 L40 43 L40 38 L45 38" stroke="#00e5ff" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M65 43 L60 43 L60 38 L55 38" stroke="#00e5ff" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Body/Head outline -->
  <ellipse cx="50" cy="66" rx="17" ry="16" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>
  <circle cx="50" cy="43" r="21" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Paws -->
  <ellipse cx="34" cy="72" rx="6" ry="4" fill="#0d1230" stroke="#00e5ff" stroke-width="0.7" opacity="0.8"/>
  <ellipse cx="66" cy="72" rx="6" ry="4" fill="#0d1230" stroke="#00e5ff" stroke-width="0.7" opacity="0.8"/>
  <!-- Feet -->
  <ellipse cx="42" cy="82" rx="7.5" ry="4.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.7" opacity="0.8"/>
  <ellipse cx="58" cy="82" rx="7.5" ry="4.5" fill="#0d1230" stroke="#00e5ff" stroke-width="0.7" opacity="0.8"/>
</svg>
