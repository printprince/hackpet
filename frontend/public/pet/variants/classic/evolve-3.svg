<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0eaff"/>
      <stop offset="100%" stop-color="#c8b8e8"/>
    </radialGradient>
    <radialGradient id="fur" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d09040"/>
      <stop offset="100%" stop-color="#905510"/>
    </radialGradient>
    <radialGradient id="muzz" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0d0"/>
      <stop offset="100%" stop-color="#e8c888"/>
    </radialGradient>
    <radialGradient id="cape" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <ellipse cx="50" cy="89" rx="20" ry="5" fill="#8060a0" opacity="0.3"/>
  <!-- Cape behind body -->
  <path d="M28 50 Q20 70 25 88 Q50 92 75 88 Q80 70 72 50 Z" fill="url(#cape)" opacity="0.85"/>
  <!-- Hood -->
  <path d="M28 44 Q30 20 50 18 Q70 20 72 44 Q65 38 50 37 Q35 38 28 44 Z" fill="#6d28d9"/>
  <!-- Body -->
  <ellipse cx="50" cy="67" rx="19" ry="18" fill="url(#fur)"/>
  <!-- Head -->
  <circle cx="50" cy="42" r="22" fill="url(#fur)"/>
  <!-- Ears (under hood) -->
  <circle cx="30" cy="24" r="9" fill="#905510"/>
  <circle cx="30" cy="24" r="5.5" fill="#d87050"/>
  <circle cx="70" cy="24" r="9" fill="#905510"/>
  <circle cx="70" cy="24" r="5.5" fill="#d87050"/>
  <!-- Glasses -->
  <circle cx="42" cy="40" r="7" fill="none" stroke="#6366f1" stroke-width="1.8"/>
  <circle cx="58" cy="40" r="7" fill="none" stroke="#6366f1" stroke-width="1.8"/>
  <line x1="49" y1="40" x2="51" y2="40" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="28" y1="38" x2="35" y2="40" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="65" y1="40" x2="72" y2="38" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Glowing eyes behind glasses -->
  <circle cx="42" cy="40" r="4" fill="#1a0d04"/>
  <circle cx="58" cy="40" r="4" fill="#1a0d04"/>
  <circle cx="42" cy="40" r="2" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="58" cy="40" r="2" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="42" cy="40" r="0.8" fill="white"/>
  <circle cx="58" cy="40" r="0.8" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="49" rx="10.5" ry="7.5" fill="url(#muzz)"/>
  <!-- Nose -->
  <ellipse cx="50" cy="46.5" rx="2.5" ry="1.8" fill="#5a2a10"/>
  <!-- Determined mouth -->
  <path d="M45 51 L55 51" stroke="#5a2a10" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Stars on cape -->
  <circle cx="38" cy="72" r="1.5" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="62" cy="68" r="1.5" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="50" cy="78" r="1.5" fill="#a78bfa" filter="url(#glow)"/>
  <!-- Badge -->
  <rect x="42" y="60" width="16" height="10" rx="2.5" fill="#4f46e5"/>
  <path d="M46 63 L44.5 65 L46 67" stroke="#c7d2fe" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M54 63 L55.5 65 L54 67" stroke="#c7d2fe" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="52" y1="63" x2="48" y2="67" stroke="#c7d2fe" stroke-width="1" stroke-linecap="round"/>
  <!-- Arms -->
  <ellipse cx="32" cy="68" rx="7" ry="5.5" fill="#905510" transform="rotate(-25 32 68)"/>
  <ellipse cx="68" cy="68" rx="7" ry="5.5" fill="#905510" transform="rotate(25 68 68)"/>
  <!-- Feet -->
  <ellipse cx="42" cy="83" rx="8" ry="5" fill="#905510"/>
  <ellipse cx="58" cy="83" rx="8" ry="5" fill="#905510"/>
</svg>
