<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4e0"/>
      <stop offset="100%" stop-color="#dfc890"/>
    </radialGradient>
    <radialGradient id="fur" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#daa050"/>
      <stop offset="100%" stop-color="#a86020"/>
    </radialGradient>
    <radialGradient id="muzz" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0d0"/>
      <stop offset="100%" stop-color="#ecd098"/>
    </radialGradient>
    <radialGradient id="screen" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#020802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <ellipse cx="50" cy="88" rx="19" ry="4.5" fill="#b08040" opacity="0.3"/>
  <!-- Body (taller) -->
  <ellipse cx="50" cy="67" rx="18" ry="18" fill="url(#fur)"/>
  <!-- Head -->
  <circle cx="50" cy="42" r="22" fill="url(#fur)"/>
  <!-- Ears -->
  <circle cx="31" cy="26" r="9.5" fill="#a86020"/>
  <circle cx="31" cy="26" r="6" fill="#e0906a"/>
  <circle cx="69" cy="26" r="9.5" fill="#a86020"/>
  <circle cx="69" cy="26" r="6" fill="#e0906a"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="49" rx="11" ry="8" fill="url(#muzz)"/>
  <!-- Eyes -->
  <circle cx="42" cy="39" r="5" fill="#1a0d04"/>
  <circle cx="58" cy="39" r="5" fill="#1a0d04"/>
  <circle cx="43.5" cy="37.5" r="1.8" fill="white"/>
  <circle cx="59.5" cy="37.5" r="1.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="46.5" rx="2.8" ry="2" fill="#5a2a10"/>
  <path d="M45.5 50.5 Q50 54 54.5 50.5" stroke="#5a2a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="35" cy="45" rx="4" ry="2.5" fill="#f0a060" opacity="0.4"/>
  <ellipse cx="65" cy="45" rx="4" ry="2.5" fill="#f0a060" opacity="0.4"/>
  <!-- Terminal screen on belly -->
  <rect x="38" y="58" width="24" height="16" rx="3" fill="url(#screen)" stroke="#22c55e" stroke-width="0.8"/>
  <!-- Green text lines on terminal -->
  <line x1="41" y1="62" x2="53" y2="62" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="41" y1="65" x2="58" y2="65" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="41" y1="68" x2="50" y2="68" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- cursor blink rect -->
  <rect x="50.5" y="66.5" width="2.5" height="2.5" fill="#22c55e" filter="url(#glow)"/>
  <!-- Arms -->
  <ellipse cx="33" cy="69" rx="7" ry="5.5" fill="#a86020" transform="rotate(-25 33 69)"/>
  <ellipse cx="67" cy="69" rx="7" ry="5.5" fill="#a86020" transform="rotate(25 67 69)"/>
  <!-- Feet -->
  <ellipse cx="42" cy="83" rx="8" ry="5" fill="#a86020"/>
  <ellipse cx="58" cy="83" rx="8" ry="5" fill="#a86020"/>
</svg>
