<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </radialGradient>
    <radialGradient id="fur" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c88030"/>
      <stop offset="100%" stop-color="#7a4010"/>
    </radialGradient>
    <radialGradient id="muzz" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0c8"/>
      <stop offset="100%" stop-color="#e0c070"/>
    </radialGradient>
    <radialGradient id="shield" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <linearGradient id="cape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="49" fill="url(#bg)"/>
  <!-- Aura glow -->
  <circle cx="50" cy="50" r="45" fill="#f59e0b" opacity="0.12" filter="url(#glow)"/>
  <ellipse cx="50" cy="89" rx="21" ry="5" fill="#a07020" opacity="0.4"/>
  <!-- Cape flowing -->
  <path d="M22 46 Q14 65 18 88 Q50 96 82 88 Q86 65 78 46 Q65 55 50 54 Q35 55 22 46 Z" fill="url(#cape)" opacity="0.9"/>
  <!-- Body (muscular) -->
  <ellipse cx="50" cy="66" rx="20" ry="19" fill="url(#fur)"/>
  <!-- Chest armor plate -->
  <path d="M34 57 Q50 52 66 57 L64 75 Q50 80 36 75 Z" fill="#fbbf24" opacity="0.3"/>
  <!-- Head -->
  <circle cx="50" cy="40" r="23" fill="url(#fur)"/>
  <!-- Ears -->
  <circle cx="29" cy="23" r="10" fill="#7a4010"/>
  <circle cx="29" cy="23" r="6" fill="#cc7040"/>
  <circle cx="71" cy="23" r="10" fill="#7a4010"/>
  <circle cx="71" cy="23" r="6" fill="#cc7040"/>
  <!-- Crown -->
  <path d="M34 30 L37 20 L42 28 L50 18 L58 28 L63 20 L66 30 Z" fill="#fbbf24"/>
  <path d="M34 30 L66 30 L64 36 L36 36 Z" fill="#f59e0b"/>
  <circle cx="50" cy="22" r="2.5" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="40" cy="25" r="1.8" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="60" cy="25" r="1.8" fill="#a855f7" filter="url(#glow)"/>
  <!-- Eyes glowing -->
  <circle cx="42" cy="39" r="5" fill="#1a0d04"/>
  <circle cx="58" cy="39" r="5" fill="#1a0d04"/>
  <circle cx="42" cy="39" r="2.5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="58" cy="39" r="2.5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="42" cy="39" r="1" fill="white"/>
  <circle cx="58" cy="39" r="1" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="47" rx="10.5" ry="7.5" fill="url(#muzz)"/>
  <ellipse cx="50" cy="44.5" rx="2.5" ry="1.8" fill="#5a2a10"/>
  <!-- Confident smile -->
  <path d="M44.5 49 Q50 53 55.5 49" stroke="#5a2a10" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Shield (left arm holds) -->
  <path d="M17 55 Q17 45 22 40 L30 45 Q28 55 24 65 Q20 70 17 68 Z" fill="url(#shield)" stroke="#b45309" stroke-width="1"/>
  <!-- {} symbol on shield -->
  <text x="21" y="59" font-size="7" fill="#7c2d12" font-family="monospace" font-weight="bold">{}</text>
  <!-- Right arm raised -->
  <ellipse cx="72" cy="62" rx="8" ry="5.5" fill="#7a4010" transform="rotate(30 72 62)"/>
  <!-- Paw -->
  <circle cx="78" cy="58" r="5" fill="#7a4010"/>
  <!-- Feet -->
  <ellipse cx="41" cy="83" rx="9" ry="5.5" fill="#7a4010"/>
  <ellipse cx="59" cy="83" rx="9" ry="5.5" fill="#7a4010"/>
  <!-- Gold trim on cape -->
  <path d="M22 46 Q35 55 50 54 Q65 55 78 46" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
